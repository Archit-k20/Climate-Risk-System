version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: climate_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: climate_user
      POSTGRES_PASSWORD: climate_pass
      POSTGRES_DB: climate_ai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
